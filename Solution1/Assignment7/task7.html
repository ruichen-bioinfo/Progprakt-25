<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Aufgabe 7: Prosite Scanner</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; }
        .form-group { margin-bottom: 20px; border: 1px solid #ddd; padding: 15px; border-radius: 5px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        textarea { width: 100%; height: 150px; font-family: monospace; }
        input[type="text"] { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background: #27ae60; color: white; border: none; padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 5px; }
        button:hover { background: #2ecc71; }
        a { text-decoration: none; color: #3498db; }
    </style>
</head>
<body>

    <p><a href="gruppe11.html">&larr; Back to overview</a></p>

    <h1>Aufgabe 7: Prosite Pattern Scanner</h1>


    <form action="cgi-bin/psscan.py" method="post">

        <div class="form-group">
            <label>1. FASTA Sequence Input:</label>
            <textarea name="fasta" placeholder=">Header&#10;MKTIIALSYIFCLVFADYKDDDD..."></textarea>
        </div>

        <div class="form-group">
            <label>2. Pattern Source Select:</label>

            <p><strong>Option A: Manual Pattern</strong></p>
            <input type="text" name="pattern" placeholder="z.B. [LIVMF]-H-x(2)-G-{STC}">

            <p style="text-align: center; margin: 10px 0;">-- ODER --</p>

            <p><strong>Option B: Prosite ID (Web)</strong></p>
            <input type="checkbox" name="use_web" id="use_web"> <label for="use_web" style="display:inline;">Load From Web</label>
            <input type="text" name="prosite_id" placeholder="z.B. PS00001" style="margin-top:5px;">
        </div>

        <button type="submit">Scan start</button>
        <input type="reset" value="Zurücksetzen" style="margin-left: 10px; padding: 10px;">
    </form>

</body>
</html>
